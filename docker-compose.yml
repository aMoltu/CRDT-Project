services:
  wasm-build:
    image: emscripten/emsdk
    volumes:
      - .:/src
    working_dir: /src/crdt-lib
    command: >
      sh -c "mkdir -p build-wasm &&
             cd build-wasm &&
             emcmake cmake .. &&
             emmake make"

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
